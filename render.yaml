services:
  - type: web
    name: nexus-chat
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: ALLOW_INSECURE_DEV_SECRET
        value: "false"
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DB_POOL_MAX
        value: "5"
      - key: REQUIRE_REDIS
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_SAME_SITE
        value: "none"
      - key: COOKIE_PARTITIONED
        value: "false"
      - key: ALLOW_FILE_CLIENTS
        value: "false"
      - key: STATIC_CLIENT_ORIGINS
        value: ""
      - key: PUBLIC_APP_ORIGIN
        sync: false
      - key: TRUST_PROXY
        value: "1"
      - key: NEXUS_LINK_SHARED_SECRET
        sync: false
      - key: NEXUS_LINK_URL
        sync: false
      - key: NEXUS_LINK_STATE_SECRET
        sync: false
      - key: CORE_ADMIN_IDS
        sync: false
      - key: NON_REMOVABLE_ADMIN_IDS
        sync: false
      - key: ADMIN_QR_CODE
        sync: false
      - key: LIMITED_ADMIN_NFC_CODE
        sync: false
      - key: LIMITED_ADMIN_ACCESS_CODE
        sync: false
