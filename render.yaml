services:
  - type: web
    name: nexus-chat
    env: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_SSL
        value: "true"
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: DB_POOL_MAX
        value: "5"
      - key: REQUIRE_REDIS
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: TRUST_PROXY
        value: "1"
