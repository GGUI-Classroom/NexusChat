services:
  postgres:
    image: postgres:16-alpine
    container_name: nexus-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexus
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus-local-password
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: nexus-chat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - nexus_redis_data:/data

volumes:
  nexus_postgres_data:
  nexus_redis_data:
